        rel="stylesheet">

    <link rel="stylesheet"
        href="css/style.css">
</head>

        <div class="container">

            <a class="navbar-brand fw-bold"
                href="index.html">

                Portfolio

            </a>

            <button class="navbar-toggler"
                data-bs-toggle="collapse"
                data-bs-target="#menu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse"
                id="menu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link"
                            href="index.html">
                            Home
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                            href="about.html">

                    <li class="nav-item">
                        <a class="nav-link"

                    <li class="nav-item">

    <main>

        <div class="container py-5">

            <h2 class="section-title">
                Contact Me
            </h2>

            <div class="row justify-content-center">

                <div class="col-lg-8">

                    <div class="card">

                        <div class="card-body p-4">

                            <h4 class="text-primary mb-4">
                                Get In Touch
                            </h4>

                            <form>

                                <div class="mb-3">

                                    <label class="form-label">
                                        Name
                                    </label>

                                    <input type="text"
                                        class="form-control"
                                        placeholder="Enter your name">

                                </div>

                                <div class="mb-3">

                                    <label class="form-label">
                                        Email
                                    </label>

                                    <input type="email"
                                        class="form-control"
                                        placeholder="Enter your email">

                                </div>

                                <div class="mb-3">

                                    <label class="form-label">
                                        Subject
                                    </label>

                                    <input type="text"
                                        class="form-control"
                                        placeholder="Enter subject">

                                </div>

                                <div class="mb-4">

                                    <label class="form-label">
                                        Message
                                    </label>

                                    <textarea
                                        rows="5"
                                        class="form-control"
                                        placeholder="Type your message"></textarea>

                                </div>

                                <button
                                    type="button"
                                    class="btn btn-custom"
                                    data-bs-toggle="modal"
                                    data-bs-target="#contactModal">

                                    Send Message

                                </button>

                            </form>

                        </div>

                    </div>

                </div>

            </div>

            <!-- Social Links -->

            <div class="row mt-5">

                <div class="col-md-12 text-center">

                    <h4 class="text-primary mb-3">
                        Connect With Me
                    </h4>

                    <a href="https://github.com/Nishvika14" target="_blank"
                        class="social-link">

                        GitHub

                    </a>

                    <a href="https://www.linkedin.com/in/nishvika-kandela/" target="_blank"
                        class="social-link">

                        LinkedIn

                    </a>

                    <a href="https://leetcode.com/u/Nishvika_Reddy/" target="_blank"
                        class="social-link">

                        LeetCode

                    </a>

                    <a href="https://www.hackerrank.com/profile/nishvikareddy14" target="_blank"
                        class="social-link">

                        HackerRank

                    </a>

                </div>

            </div>

        </div>

    </main>

    <!-- Success Modal -->

    <div class="modal fade"
        id="contactModal">

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title">
                        Message Sent
                    </h5>

                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body">

                    Thank you for contacting me.

                    <br><br>

                    I will get back to you soon.

                </div>

                <div class="modal-footer">

                    <button
                        type="button"
                        class="btn btn-primary"
                        data-bs-dismiss="modal">

                        OK

                    </button>

                </div>

            </div>

        </div>

    </div>
