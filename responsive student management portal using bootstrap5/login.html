<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <title>Login Page</title>

    <style>
        body {
            background: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ1bWkCaw6uwmLsehGX9CRBZrwPOGakEGhSjw&s');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }

        .overlay {
            min-height: 100vh;
            background: rgba(0, 0, 0, 0.55);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            width: 100%;
            max-width: 500px;

            background: rgba(255, 255, 255, 0.12);

            backdrop-filter: blur(12px);

            border: 1px solid rgba(255, 255, 255, 0.2);

            border-radius: 20px;

            color: white;

            box-shadow: 0 15px 35px rgba(0, 0, 0, .4);
        }

        .card-header {
            background: transparent;
            border-bottom: 1px solid rgba(255,255,255,.2);
        }

        .form-control {
            background: rgba(255,255,255,.15);
            border: none;
            color: white;
        }

        .form-control:focus {
            background: rgba(255,255,255,.2);
            color: white;
            box-shadow: none;
        }

        .form-control::placeholder {
            color: rgba(255,255,255,.7);
        }

        .portal-title {
            font-weight: bold;
            text-shadow: 2px 2px 5px black;
        }

        .register-link {
            color: #0d6efd;
            text-decoration: none;
        }

        .register-link:hover {
            text-decoration: underline;
        }
    </style>

</head>

<body>

    <div class="overlay">

        <div class="card login-card">

            <div class="card-header text-center py-4">

                <img src="https://cvr.ac.in/icrteeci/cvr.png"
                    width="80"
                    height="80"
                    class="mb-2">

                <h2 class="portal-title">
                    Student Management Portal
                </h2>

                <p class="mb-0">
                    Student Login
                </p>

            </div>

            <div class="card-body p-4">

                <div class="mb-3">

                    <label class="form-label">
                        Email Address
                    </label>

                    <input
                        type="email"
                        id="loginEmail"
                        class="form-control"
                        placeholder="Enter Email">

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Password
                    </label>

                    <input
                        type="password"
                        id="loginPassword"
                        class="form-control"
                        placeholder="Enter Password">

                </div>

                <div class="d-grid">

                    <button
                        class="btn btn-primary btn-lg"
                        onclick="login()">

                        Login

                    </button>

                </div>

                <hr>

                <div class="text-center">

                    <p>

                        New Student?

                        <a href="registrationform.html"
                            class="register-link">

                            Register Here

                        </a>

                    </p>

                </div>

            </div>

        </div>

    </div>

    <script src="/responsive student management portal using bootstrap5/js/storage.js"></script>

</body>

</html>
