<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body{
            background: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ1bWkCaw6uwmLsehGX9CRBZrwPOGakEGhSjw&s') no-repeat center center fixed;
            background-size: cover;
        }
        .form-container{
            max-width: 700px;
            margin: 50px auto;
        }
    </style>
    <title>Registration Page</title>
</head>

<body>
    <div class="container form-container">
        <div class="card bg-dark bg-opacity-75 text-white shadow-lg border-0 rounded-4">
            <div class="card-header text-center py-3">
                <h2>Student Registration Form</h2>
            </div>
            <div class="card-body p-4">
                <form action="#">
                    <div class="mb-3">
                        <label class="form-label">Full Name : </label>
                        <input type="text" class="form-control" placeholder="Enter Full Name">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Roll Number : </label>
                        <input type="text" class="form-control" placeholder="Enter Roll Number">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email : </label>
                        <input type="email" class="form-control" placeholder="Enter Email">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mobile Number : </label>
                        <input type="tel" class="form-control" placeholder="Enter Mobile Number">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Gender : </label>
                        <div class="form-check">
                            <input type="radio" class="form-check-input" id="male" name="gender">
                            <label class="form-check-label" for="male">Male</label>
                        </div>
                        <div class="form-check">
                            <input type="radio" class="form-check-input" id="female" name="gender">
                            <label class="form-check-label" for="female">Female</label>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Branch : </label>
                        <select class="form-select">
                            <option>Computer Science and Engineering</option>
                            <option>Data Science</option>
                            <option>Cyber Security</option>
                            <option>Artificial intelligence</option>
                            <option>Machine Learning</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Date of Birth : </label>
                        <input type="date" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Address : </label>
                        <textarea class="form-control" rows="4"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Upload Photo</label>
                        <input type="file" class="form-control">
                    </div>
                    <div class="form-check mb-4">
                        <input type="checkbox" class="form-check-input" id="terms">
                        <label class="form-check-label" for="terms">I Agree to terms and conditions.</label> 
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Register</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
